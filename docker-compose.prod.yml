# Production docker-compose configuration

services:
  # FastAPI Application - Production
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-contract-llm-api:latest
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=sqlite:///./data/smart_contract_llm.db
      - VECTOR_DB_PATH=/app/vector_db
      - FLOW_PROJECTS_PATH=/app/flow_projects
      - LOG_PATH=/app/logs
      - DEBUG=false
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-}
    volumes:
      - flow_projects:/app/flow_projects
      - vector_db:/app/vector_db
      - logs:/app/logs
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - flowzmith-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ChromaDB for Vector Search - Production
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ALLOW_RESET=FALSE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - flowzmith-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Redis for caching - Production
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - flowzmith-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Nginx Reverse Proxy - Production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - flowzmith-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'

volumes:
  flow_projects:
    driver: local
  vector_db:
    driver: local
  logs:
    driver: local
  db_data:
    driver: local
  chroma_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  flowzmith-network:
    driver: bridge
