# Development override for docker-compose.yml

services:
  # FastAPI Application - Development
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      - DATABASE_URL=sqlite:///./data/smart_contract_llm.db
      - VECTOR_DB_PATH=/app/vector_db
      - FLOW_PROJECTS_PATH=/app/flow_projects
      - LOG_PATH=/app/logs
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      # Mount source code for live reloading
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./static:/app/static
      - ./context:/app/context
      - ./prompts:/app/prompts
      - flow_projects:/app/flow_projects
      - vector_db:/app/vector_db
      - logs:/app/logs
      - db_data:/app/data
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--workers", "1"]

  # CLI Service - Development
  cli:
    build:
      context: .
      dockerfile: Dockerfile.cli
      target: builder
    environment:
      - DATABASE_URL=sqlite:///./data/smart_contract_llm.db
      - VECTOR_DB_PATH=/app/vector_db
      - FLOW_PROJECTS_PATH=/app/flow_projects
      - LOG_PATH=/app/logs
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      # Mount source code for live reloading
      - ./src:/app/src
      - ./cli.py:/app/cli.py
      - ./context:/app/context
      - ./prompts:/app/prompts
      - flow_projects:/app/flow_projects
      - vector_db:/app/vector_db
      - logs:/app/logs
      - db_data:/app/data
