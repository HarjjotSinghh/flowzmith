
services:
  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/smart_contract_llm.db
      - VECTOR_DB_PATH=/app/vector_db
      - FLOW_PROJECTS_PATH=/app/flow_projects
      - LOG_PATH=/app/logs
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - flow_projects:/app/flow_projects
      - vector_db:/app/vector_db
      - logs:/app/logs
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - flowzmith-network

  # CLI Service
  cli:
    build:
      context: .
      dockerfile: Dockerfile.cli
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=sqlite:///./data/smart_contract_llm.db
      - VECTOR_DB_PATH=/app/vector_db
      - FLOW_PROJECTS_PATH=/app/flow_projects
      - LOG_PATH=/app/logs
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - flow_projects:/app/flow_projects
      - vector_db:/app/vector_db
      - logs:/app/logs
      - db_data:/app/data
    restart: "no"
    depends_on:
      - api
    networks:
      - flowzmith-network
    # Override entrypoint to keep container running for interactive use
    command: ["tail", "-f", "/dev/null"]

  # ChromaDB for Vector Search
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ALLOW_RESET=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - flowzmith-network

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - flowzmith-network

volumes:
  flow_projects:
    driver: local
  vector_db:
    driver: local
  logs:
    driver: local
  db_data:
    driver: local
  chroma_data:
    driver: local
  redis_data:
    driver: local

networks:
  flowzmith-network:
    driver: bridge