version: '3.8'

services:
  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/smart_contract_llm
      - REDIS_URL=redis://redis:6379
      - VECTOR_DB_PATH=/app/vector_db
      - FLOW_PROJECTS_PATH=/app/flow_projects
      - LOG_PATH=/app/logs
    volumes:
      - ./flow_projects:/app/flow_projects
      - ./vector_db:/app/vector_db
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
    networks:
      - smart-contract-network

  # PostgreSQL Database
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=smart_contract_llm
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - smart-contract-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smart-contract-network

  # ChromaDB for Vector Search (Optional)
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ALLOW_RESET=TRUE
    networks:
      - smart-contract-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - smart-contract-network

  # Flow CLI Container (Optional)
  flow-cli:
    image: ghcr.io/onflow/flow-cli:latest
    volumes:
      - ./flow_projects:/workspace
    working_dir: /workspace
    networks:
      - smart-contract-network

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  smart-contract-network:
    driver: bridge